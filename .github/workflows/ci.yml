name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# If you push twice in quick succession, the older run is cancelled.
# Saves CI minutes and keeps the queue clean.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Reuses ~/.nuget/packages between runs. Key includes every csproj plus
      # Directory.Build.props so a dependency change invalidates cleanly.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore MartenStarter.slnx

      # TreatWarningsAsErrors is on in Directory.Build.props, so a stray
      # unused-variable will fail the build here.
      - name: Build
        run: dotnet build MartenStarter.slnx --no-restore

      # Integration tests use Testcontainers, which talks to the runner's
      # Docker daemon (ubuntu-latest has it pre-installed). Same code path
      # as `dotnet test` locally — no CI-specific test config.
      - name: Test
        run: >
          dotnet test MartenStarter.slnx
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx
          retention-days: 7
